 <div class="max-w-6xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-white mb-2 italic uppercase tracking-tight">Brindemos solución</h1>
            <p class="text-blue-100 text-lg">Conducta 3: Brindo soluciones al cliente</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 lg:gap-16 mb-8">
            <div class="flex flex-col items-center">
                <h3 class="text-xl font-bold mb-6 text-white uppercase tracking-wide">Necesidad del Cliente</h3>
                <div class="wheel-container">
                    <div class="arrow"></div>
                    <div id="wheel-client" class="wheel"></div>
                </div>
                <button onclick="spin('client')" class="mt-8 bg-white text-blue-900 font-black py-3 px-8 rounded-full shadow-lg active:scale-95 transition hover:bg-blue-50">
                    GIRAR NECESIDAD
                </button>
                <div id="res-client" class="result-box mt-6 w-full italic text-gray-400">
                    Esperando giro...
                </div>
            </div>

            <div class="flex flex-col items-center">
                <h3 class="text-xl font-bold mb-6 text-white uppercase tracking-wide">Contexto / Condición</h3>
                <div class="wheel-container">
                    <div class="arrow"></div>
                    <div id="wheel-cond" class="wheel"></div>
                </div>
                <button onclick="spin('cond')" class="mt-8 bg-white text-blue-900 font-black py-3 px-8 rounded-full shadow-lg active:scale-95 transition hover:bg-blue-50">
                    GIRAR CONTEXTO
                </button>
                <div id="res-cond" class="result-box mt-6 w-full italic text-gray-400">
                    Esperando giro...
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            <div class="bg-white rounded-2xl shadow-xl p-6 border-t-4 border-red-500 text-center">
                <h4 class="text-gray-400 font-bold uppercase text-xs mb-2">Cronómetro</h4>
                <div id="timer" class="text-5xl font-black text-gray-800 mb-4 tabular-nums">01:00</div>
                <div class="flex justify-center gap-3">
                    <button id="timer-btn" onclick="toggleTimer()" class="bg-gray-800 text-white px-8 py-2 rounded-lg font-bold hover:bg-black transition">INICIAR</button>
                    <button onclick="resetTimer()" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-lg font-bold hover:bg-gray-200 transition">↺</button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-xl p-6 border-t-4 border-blue-500">
                <h4 class="text-gray-400 font-bold uppercase text-xs mb-4 text-center">Registro de Turno</h4>
                <div class="space-y-3">
                    <div class="relative">
                        <input type="text" id="store-search" placeholder="Buscar tienda..."
                               class="w-full px-4 py-2 border-2 border-gray-100 rounded-lg focus:border-blue-300 outline-none text-gray-700 text-sm font-medium"
                               oninput="filterStores()">
                    </div>
                    <select id="store-select" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-600 outline-none bg-white text-gray-800 font-semibold">
                        <option value="" disabled selected>Selecciona tu Tienda...</option>
                    </select>
                    <button onclick="saveParticipation()" id="save-btn" class="w-full bg-blue-600 text-white font-black py-3 rounded-xl hover:bg-blue-700 transition disabled:opacity-30 uppercase" disabled>
                        REGISTRAR TURNO
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden mb-12">
            <div class="bg-gray-50 px-6 py-4 border-b flex justify-between items-center">
                <h3 class="font-bold text-gray-600 uppercase text-xs">Historial</h3>
                <span id="counter-badge" class="bg-blue-600 text-white text-[10px] px-2 py-0.5 rounded-full font-bold uppercase">0 TURNOS</span>
            </div>
            <div class="max-h-80 overflow-y-auto text-gray-700">
                <table class="w-full text-left">
                    <tbody id="history-body" class="divide-y text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

        // --- FUNCIÓN DE GUARDADO MODIFICADA PARA GOOGLE SHEETS ---
        function saveParticipation() {
            const store = document.getElementById('store-select').value;
            if(!store) {
                alert("Por favor selecciona una tienda antes de registrar.");
                return;
            }

            // 1. Deshabilitar botón para evitar múltiples clics
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerText = "GUARDANDO...";

            // 2. Enviar datos al Google Sheets Webhook
            fetch(URL_GOOGLE_SHEETS, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "tienda": store })
            })
            .then(() => {
                console.log("Datos enviados al Sheets");
                // 3. Si se envió bien, actualizamos el historial visual
                actualizarHistorialVisual(store);
                btn.innerText = "REGISTRAR TURNO";
                alert("¡Turno registrado en la base de datos!");
            })
            .catch(err => {
                console.error("Error al guardar:", err);
                alert("Hubo un error al conectar con el servidor.");
                btn.disabled = false;
                btn.innerText = "REGISTRAR TURNO";
            });
        }

        function actualizarHistorialVisual(store) {
            history.unshift({ store, client: results.client, cond: results.cond });
            const body = document.getElementById('history-body');
            body.innerHTML = history.map(h => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-3 align-top w-1/3 font-bold text-blue-900">${h.store}</td>
                    <td class="p-3 text-xs">
                        <div class="text-gray-800 font-semibold mb-1">N: ${h.client}</div>
                        <div class="text-blue-600">C: ${h.cond}</div>
                    </td>
                </tr>
            `).join('');
            document.getElementById('counter-badge').innerText = `${history.length} TURNOS`;
        }
